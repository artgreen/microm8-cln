# staticcheck.conf — local-CI lint policy for microM8.
#
# Run via `tools/scripts/check.sh staticcheck` or `tools/scripts/check.sh all`.
# Format docs: https://staticcheck.dev/docs/configuration/
#
# Philosophy: enable bug-tier checks (everything that finds correctness issues)
# and silence the style-tier checks whose fixes would mass-rewrite the codebase
# without changing behavior. Each disabled check is annotated with the
# baseline-hit count (against the post-Phase-5 tree) and the reason it is off
# rather than fix-up-front.
#
# When the next phase adds substantive cleanup, prefer turning a check BACK ON
# (and fixing what fires) over leaving it disabled.

checks = [
  "all",

  # ─── codebase-wide style conventions (NOT bugs) ────────────────────────
  "-ST1006",   # 3440 — receiver name; this codebase uses `this`/`self` by convention
  "-ST1023",   # 355  — `var x T = expr` → `var x = expr`; pure style
  "-ST1016",   # 64   — inconsistent receiver names per type; same root as ST1006
  "-ST1005",   # 315  — error-string capitalization; would touch hundreds of user-facing strings
  "-ST1003",   # naming conventions — too many legacy names; revisit in a focused phase

  # ─── pure simplification noise (no behavior change) ────────────────────
  "-S1021",    # 975 — `var x T = …` → `x := …`; pure style
  "-S1023",    # 297 — redundant `break` at end of case; pure style
  "-S1002",    # 218 — `== true` patterns; readability preference
  "-S1005",    # 224 — unnecessary `_ = x`; often deliberate (silences other linters)
  "-S1009",    # 24  — `len(x) == 0` vs nil; readability preference
  "-S1017",    # 16  — strings.TrimPrefix idiom
  "-S1001",    # 15  — slice-copy with copy()
  "-S1000",    # 12  — `for x := range ch` idiom
  "-S1003",    # 11  — strings.Contains idiom
  "-S1004",    # 8   — bytes.Equal idiom
  "-S1011",    # 7   — append-slice idiom
  "-S1008",    # 4   — if/else → boolean return
  "-S1031",    # 3   — nil-slice range guard
  "-S1039",    # 2   — Sprintf with one constant arg
  "-S1006",    # 2   — for-with-break → for !cond
  "-S1033",    # 2   — len() guard before for-range
  "-S1010",    # 1   — empty slice expression
  "-S1034",    # 1   — repeated type assertion

  # ─── deferred to a dedicated audit phase ───────────────────────────────
  # SA4009: argument overwritten before use. The 951 hits in our tree are
  # dominated by the C-style "use the parameter as a local scratch variable"
  # pattern; fixing them mechanically would require API signature changes
  # across many call sites. Keep an eye on this — small spikes after a refactor
  # usually flag a real bug.
  "-SA4009",

  # SA4006: assigned value never used (119 hits). A mix of real swallowed-error
  # bugs (`e = files.WriteX(...)` with no follow-up check) and dead code from
  # abandoned branches. Will fix as part of an error-handling-audit pass.
  "-SA4006",

  # SA9003: empty branch (56 hits). Dominated by abandoned debug placeholders
  # — `if isDebug { /* commented-out PutStr */ }`. Disabling preserves the
  # intent (someone meant to wire debug output here). Revisit when we add
  # structured logging.
  "-SA9003",

  # U1000: unused identifier (368 hits). Many fields are touched via reflection
  # (JSON/BSON tags, dialect registration); needs case-by-case triage.
  "-U1000",

  # ST1000: package docstrings missing — large mechanical fix; defer.
  "-ST1000",

  # ST1020/ST1021/ST1022: exported-doc comments — defer.
  "-ST1020",
  "-ST1021",
  "-ST1022",
]
