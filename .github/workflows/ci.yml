name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Module currently lives under GoPath/src/paleotronic.com (will move to repo root in Phase 3).
# `working-directory` defaults route most steps there; build/vet helpers cd from repo root.
defaults:
  run:
    working-directory: GoPath/src/paleotronic.com

env:
  # Until vendor/ is reconciled (Phase 1) or removed, force module mode.
  GOFLAGS: "-mod=mod"

jobs:
  # ---------------------------------------------------------------------------
  # gofmt: non-gating until Phase 2 reformats the tree (~384 files unformatted
  # right now). Emits annotations + a step-summary count so reviewers see the
  # debt without the check going red. Flip to a hard fail in Phase 2 by setting
  # `STRICT=1` (then this script exits 1 when anything's unformatted).
  # ---------------------------------------------------------------------------
  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: GoPath/src/paleotronic.com/go.mod
      - name: gofmt -l
        env:
          STRICT: "0"
        run: |
          unformatted=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -z "$unformatted" ]; then
            echo "All files formatted."
            exit 0
          fi
          count=$(echo "$unformatted" | wc -l | tr -d ' ')
          echo "::warning::$count files unformatted (will gate after Phase 2)"
          echo "## Unformatted files ($count)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$unformatted" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          while IFS= read -r f; do echo "::warning file=GoPath/src/paleotronic.com/$f::file is not gofmt-clean"; done <<< "$unformatted"
          if [ "$STRICT" = "1" ]; then
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Build the shipping binary. octalyzer currently compiles cleanly; other main
  # packages don't, but they're not on the shipping path.
  # ---------------------------------------------------------------------------
  build-octalyzer:
    name: build octalyzer
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: GoPath/src/paleotronic.com/go.mod

      - name: Install CGO system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            portaudio19-dev \
            libgl1-mesa-dev \
            xorg-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxrandr-dev \
            libasound2-dev
        working-directory: .

      - name: Install CGO system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install pkg-config portaudio
        working-directory: .

      - name: go build ./octalyzer
        run: go build -o microM8 ./octalyzer

  # ---------------------------------------------------------------------------
  # vet on the known-green allowlist. Expand .ci/vet-allowlist.txt as packages
  # are cleaned up. Goal: replace contents with `./...` after Phase 4.
  # ---------------------------------------------------------------------------
  vet:
    name: vet (allowlist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: GoPath/src/paleotronic.com/go.mod
      - name: Install CGO system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config portaudio19-dev libgl1-mesa-dev xorg-dev
        working-directory: .
      - name: Read allowlist
        id: pkgs
        run: |
          pkgs=$(grep -v '^\s*#' ../../../.ci/vet-allowlist.txt | grep -v '^\s*$' | tr '\n' ' ')
          echo "Vetting: $pkgs"
          echo "list=$pkgs" >> "$GITHUB_OUTPUT"
      - name: go vet
        run: go vet ${{ steps.pkgs.outputs.list }}

  # ---------------------------------------------------------------------------
  # test on the known-passing allowlist. Most packages either fail to build
  # under `go test` or have no tests. Expand .ci/test-allowlist.txt as we add
  # or fix tests in later phases.
  # ---------------------------------------------------------------------------
  test:
    name: test (allowlist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: GoPath/src/paleotronic.com/go.mod
      - name: Install CGO system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config portaudio19-dev libgl1-mesa-dev xorg-dev
        working-directory: .
      - name: Read allowlist
        id: pkgs
        run: |
          pkgs=$(grep -v '^\s*#' ../../../.ci/test-allowlist.txt | grep -v '^\s*$' | tr '\n' ' ')
          echo "Testing: $pkgs"
          echo "list=$pkgs" >> "$GITHUB_OUTPUT"
      - name: go test
        run: go test -race ${{ steps.pkgs.outputs.list }}

  # ---------------------------------------------------------------------------
  # Informational: surface the size of the modernization debt in each PR.
  # Doesn't gate; lets reviewers see whether a PR is moving numbers in the
  # right direction.
  # ---------------------------------------------------------------------------
  debt-stats:
    name: modernization debt (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Count debt
        run: |
          echo "## Modernization debt snapshot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          ioutil=$(grep -rl '"io/ioutil"' --include='*.go' . 2>/dev/null | grep -v /vendor/ | wc -l | tr -d ' ')
          echo "| Files importing io/ioutil | $ioutil |" >> $GITHUB_STEP_SUMMARY
          seed=$(grep -rn 'rand\.Seed' --include='*.go' . 2>/dev/null | grep -v /vendor/ | wc -l | tr -d ' ')
          echo "| rand.Seed call sites | $seed |" >> $GITHUB_STEP_SUMMARY
          unfmt=$(cd GoPath/src/paleotronic.com && gofmt -l . 2>/dev/null | grep -v '^vendor/' | wc -l | tr -d ' ')
          echo "| Unformatted files | $unfmt |" >> $GITHUB_STEP_SUMMARY
          errnew=$(grep -rn 'errors\.New' --include='*.go' GoPath/src/paleotronic.com/api 2>/dev/null | grep -v /vendor/ | wc -l | tr -d ' ')
          echo "| errors.New in api/ | $errnew |" >> $GITHUB_STEP_SUMMARY
        working-directory: .
